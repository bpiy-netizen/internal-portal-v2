<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Professional Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #referral-card {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1.4; /* لضمان أبعاد ثابتة */
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            background: #1e3a8a; /* لون احتياطي */
        }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .content-layer { position: relative; z-index: 10; height: 100%; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        .glass-item { background: rgba(255, 255, 255, 0.95); border-radius: 1.2rem; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .text-glow { text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #qrcode img, #qrcode canvas { margin: 0 auto; width: 140px !important; height: 140px !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <div id="referral-card">
        <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/my-bg.JPG" class="card-bg" crossorigin="anonymous">
        
        <div class="content-layer">
            <div class="flex items-center justify-between mb-2">
                <div class="bg-white p-2 rounded-2xl shadow-lg">
                    <img src="logo.png" alt="51Talk" class="h-12 w-auto object-contain" crossorigin="anonymous">
                </div>
                <div class="bg-white px-5 py-2 rounded-xl shadow-md border-b-4 border-yellow-400">
                    <h2 id="display-consultant" class="text-lg font-black text-blue-900">البندري</h2>
                </div>
            </div>

            <div class="flex-grow flex flex-col justify-center">
                <h3 class="text-white font-bold mb-2 text-glow text-xl">إهداء حصري وخاص من <span id="display-student" class="text-yellow-400 font-black">........</span></h3>
                <h1 class="text-3xl font-black text-white leading-tight mb-6 text-glow">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="flex items-center gap-2 glass-item">
                        <span class="text-lg">🌍</span> <p class="text-blue-950 font-bold text-[10px] leading-tight">منصة عالمية ومعلمين أجانب</p>
                    </div>
                    <div class="flex items-center gap-2 glass-item">
                        <span class="text-lg">🎁</span> <p class="text-blue-950 font-bold text-[10px] leading-tight">حصة تقييمية مجانية</p>
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                <div class="bg-white p-3 rounded-3xl inline-block shadow-2xl mb-2">
                    <div id="qrcode"></div>
                </div>
                <p class="text-white font-black mb-3 text-lg italic text-glow uppercase tracking-widest">امسح الكود للحجز المباشر</p>
                
                <div class="inline-flex items-center gap-2 bg-white px-6 py-2 rounded-full shadow-lg mb-4">
                    <span class="text-green-600 text-xl">📞</span>
                    <span id="display-phone" class="text-green-700 font-black text-xl">+962 77 555 2764</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-6 w-full max-w-md bg-white p-6 rounded-3xl shadow-xl no-print">
        <div class="space-y-4">
            <input type="text" id="input-student" placeholder="اسم صديق الطالب" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl text-right font-bold focus:border-blue-500 outline-none" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl text-right font-bold focus:border-blue-500 outline-none" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl text-right font-bold focus:border-blue-500 outline-none" oninput="updateCard()">
            
            <button onclick="downloadPoster()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>حفظ البوستر بجودة عالية ✨</span>
            </button>
        </div>
    </div>

    <script>
        // توليد QR بدقة عالية جداً
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 500, height: 500,
            colorDark : "#1e3a8a", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent('مرحبا ' + consultant + '، انا من طرف ' + student + '، أرغب في حجز حصة تجريبية')}`);
        }

        function downloadPoster() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري التحميل... ⏳";
            
            html2canvas(card, {
                scale: 3, // دقة 3x لضمان جودة الطباعة
                useCORS: true, 
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `51Talk-Card-${document.getElementById('input-student').value}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerText = "حفظ البوستر بجودة عالية ✨";
            });
        }
        updateCard();
    </script>
</body>
</html>
