<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Working QR Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #referral-card {
            position: relative;
            width: 450px;
            height: 630px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: #fff;
        }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .content-layer { position: relative; z-index: 10; height: 100%; padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; text-align: center; color: white; }
        .glass-item { background: rgba(255, 255, 255, 0.9); border-radius: 1rem; padding: 6px; color: #1e3a8a; font-weight: bold; font-size: 12px; }
        #qrcode { background: white; padding: 10px; border-radius: 1.2rem; display: inline-block; }
        #qrcode img { margin: 0 auto; }
        
        /* تنسيق قسم رقم الهاتف مع الواتساب */
        .phone-container {
            background: white;
            color: #15803d;
            padding: 8px 24px;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 1.125rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* تنسيق شريط الشعارات في الأسفل */
        .bottom-logos {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 10px;
            border-radius: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }
        .bottom-logos img { height: 20px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        @media print { .no-print { display: none; } #referral-card { box-shadow: none; } }
    </style>
</head>
<body>

    <div id="referral-card">
        <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/my-bg.JPG" class="card-bg">
        <div class="content-layer">
            <div class="flex justify-between items-center">
                <div class="bg-white px-3 py-1 rounded-lg shadow-sm">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/logo.png" class="h-8 w-auto">
                </div>
                <div class="bg-white px-4 py-1 rounded-lg shadow-sm border-b-4 border-yellow-400 text-blue-900 font-black" id="display-consultant">مصطفى</div>
            </div>

            <div class="mt-4">
                <h3 class="text-lg font-bold">إهداء خاص من <span id="display-student" class="text-yellow-400 font-black">بندر الحربي</span></h3>
                <h1 class="text-2xl font-black leading-tight">تعلّم الانجليزية مع 51talk</h1>
            </div>

            <div class="grid grid-cols-2 gap-2 my-2">
                <div class="glass-item">🌍 منصة عالمية</div>
                <div class="glass-item">🎁 حصة مجانية</div>
                <div class="glass-item">🗣️ تحدث بطلاقة</div>
                <div class="glass-item">⏳ أوقات مرنة</div>
            </div>

            <div class="mb-4">
                <div id="qrcode"></div>
                <p class="mt-2 font-black text-sm italic">امسح للكود للحجز المباشر</p>
                
                <div class="mt-2">
                    <div class="phone-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.886.002-5.462-4.415-9.89-9.881-9.892-2.652 0-5.147 1.035-7.022 2.911-1.875 1.876-2.905 4.375-2.907 7.028 0 2.139.574 3.997 1.765 5.512l-1.019 3.737 3.793-.993zm11.366-4.6c-.255-.127-1.505-.742-1.74-.827-.235-.085-.406-.127-.577.127-.171.254-.663.827-.813.997-.15.17-.3.19-.555.063-.255-.127-1.077-.397-2.051-1.267-.758-.677-1.269-1.513-1.418-1.768-.149-.255-.016-.393.111-.52.114-.114.255-.3.383-.45.127-.15.171-.254.255-.423.085-.17.043-.318-.021-.445-.064-.127-.577-1.391-.79-1.906-.208-.5-.427-.43-.577-.438-.148-.008-.318-.008-.488-.008-.171 0-.448.064-.684.318-.235.254-.897.876-.897 2.138 0 1.262.918 2.481 1.046 2.651.127.17 1.808 2.761 4.379 3.869.612.264 1.09.421 1.462.539.614.195 1.173.167 1.614.101.491-.073 1.505-.615 1.719-1.209.213-.594.213-1.102.15-1.208-.064-.107-.235-.17-.49-.297z"/>
                        </svg>
                        <span id="display-phone">962775552764+</span>
                    </div>
                </div>

                <div class="bottom-logos">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tabby.png">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tamara.png">
                </div>
            </div>
        </div>
    </div>

    <div class="no-print mt-6 bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm">
        <input type="text" id="input-student" placeholder="اسم الطالب" class="w-full border p-3 rounded-xl text-right mb-2" oninput="update()">
        <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full border p-3 rounded-xl text-right mb-2" oninput="update()">
        <input type="text" id="input-phone" placeholder="962XXXXXXXX" class="w-full border p-3 rounded-xl text-right mb-4" oninput="update()">
        
        <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg mb-2">
            حفظ البوستر (Print to PDF)
        </button>
    </div>

    <script>
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 150,
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });

        function update() {
            const student = document.getElementById('input-student').value || "بندر الحربي";
            const consultant = document.getElementById('input-consultant').value || "مصطفى";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone + "+";

            const cleanPhone = phone.replace(/\D/g, ''); 
            const message = encodeURIComponent(`مرحبا ${consultant}، أنا من طرف ${student} وأرغب في تجربة حصة مجانية`);
            const whatsappUrl = `https://wa.me/${cleanPhone}?text=${message}`;
            
            qrcode.clear();
            qrcode.makeCode(whatsappUrl);
        }
        
        update();
    </script>
</body>
</html>
