<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Final Image Background Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* الحاوية الرئيسية للبطاقة */
        #referral-card {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 3rem;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* طبقة الخلفية كصورة لضمان الحفظ الصحيح */
        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        /* طبقة المحتوى فوق الخلفية */
        .content-layer {
            position: relative;
            z-index: 2;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .qr-wrapper {
            background: white;
            padding: 12px;
            border-radius: 2rem;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4">

    <div id="referral-card">
        <img src="https://img.freepik.com/free-vector/blue-curve-background_53876-113111.jpg" class="card-bg" crossorigin="anonymous">
        
        <div class="content-layer">
            <div class="flex items-center justify-between mb-6">
                <img src="logo.png" alt="51Talk" class="h-12 w-auto object-contain" crossorigin="anonymous">
                <div class="bg-white/90 px-6 py-2 rounded-xl shadow-sm border border-blue-50">
                    <h2 id="display-consultant" class="text-lg font-black text-blue-900">البندري</h2>
                </div>
            </div>

            <div class="mb-6">
                <h3 class="text-blue-800 font-bold mb-2 text-sm">إهداء حصري وخاص من <span id="display-student" class="text-red-600 font-black">........</span></h3>
                <h1 class="text-3xl font-black text-blue-950 leading-tight mb-8">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="flex items-center gap-2 bg-white/95 p-3 rounded-xl shadow-sm border border-white">
                        <span class="text-xl">🌍</span> <p class="text-blue-950 font-bold text-[10px]">منصة عالمية ومعلمين أجانب</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white/95 p-3 rounded-xl shadow-sm border border-white">
                        <span class="text-xl">🎁</span> <p class="text-blue-950 font-bold text-[10px]">حصة تقييمية مجانية</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white/95 p-3 rounded-xl shadow-sm border border-white">
                        <span class="text-xl">🗣️</span> <p class="text-blue-950 font-bold text-[10px]">التركيز على التحدث بطلاقة</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white/95 p-3 rounded-xl shadow-sm border border-white">
                        <span class="text-xl">⏳</span> <p class="text-blue-950 font-bold text-[10px]">حصص فردية وأوقات مرنة</p>
                    </div>
                </div>

                <div class="bg-blue-950/5 rounded-3xl p-4 flex flex-wrap justify-center gap-2 border border-white/50">
                    <div class="bg-blue-900 text-white px-4 py-1.5 rounded-full text-[10px] font-black">💼 إنجليزية الأعمال</div>
                    <div class="bg-blue-700 text-white px-4 py-1.5 rounded-full text-[10px] font-black">🌟 المسار الكلاسيكي</div>
                </div>
            </div>

            <div class="mt-4">
                <div class="qr-wrapper mb-4">
                    <div id="qrcode"></div>
                </div>
                <p class="text-blue-950 font-black mb-3 text-lg italic">امسح الكود للحجز المباشر</p>
                
                <div class="inline-flex items-center gap-2 bg-white/90 px-6 py-2.5 rounded-full border border-green-100 shadow-sm mb-6">
                    <span id="display-phone" class="text-blue-900 font-black text-xl">+962 77 555 2764</span>
                </div>

                <div class="flex items-center justify-center gap-8 bg-white/50 py-3 rounded-2xl">
                    <img src="tabby.png" class="h-6 w-auto" crossorigin="anonymous">
                    <img src="tamara.png" class="h-6 w-auto" crossorigin="anonymous">
                </div>
            </div>
        </div>
    </div>

    <div class="mt-6 w-full max-w-md bg-white p-6 rounded-3xl shadow-xl no-print">
        <div class="space-y-3">
            <input type="text" id="input-student" placeholder="اسم صديق الطالب" class="w-full bg-gray-50 border p-3 rounded-xl text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border p-3 rounded-xl text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border p-3 rounded-xl text-right font-bold" oninput="updateCard()">
            <button onclick="saveCard()" class="w-full bg-blue-950 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-900 transition-all">
                📸 حفظ الصورة النهائية (بجودة ثابتة)
            </button>
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 160, height: 160, colorDark : "#172554", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent('مرحبا ' + consultant + '، انا من طرف ' + student + '، أرغب في حجز حصة تجريبية')}`);
        }

        function saveCard() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;

            html2canvas(card, {
                scale: 3,
                useCORS: true,
                allowTaint: true,
                backgroundColor: null,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `51Talk-GiftCard-Official.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerText = "📸 حفظ الصورة النهائية (بجودة ثابتة)"; btn.disabled = false;
            });
        }
        updateCard();
    </script>
</body>
</html>
