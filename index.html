<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // 1. تحسين جودة الـ QR Code
    let qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 400, // رفعنا العرض ليعطي دقة أعلى عند التكبير
        height: 400, // رفعنا الطول
        colorDark : "#172554",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H // أعلى مستوى لتصحيح الخطأ لضمان المسح
    });

    // إضافة ستايل لجعل الكود الكبير يناسب المربع الصغير دون فقدان الجودة
    document.querySelector('#qrcode img').style.width = "160px";
    document.querySelector('#qrcode canvas').style.width = "160px";

    function updateCard() {
        const student = document.getElementById('input-student').value || "........";
        const consultant = document.getElementById('input-consultant').value || "البندري";
        const phone = document.getElementById('input-phone').value || "962775552764";
        
        document.getElementById('display-student').innerText = student;
        document.getElementById('display-consultant').innerText = consultant;
        document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
        
        const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
        qrcode.clear();
        qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent('مرحبا ' + consultant + '، انا من طرف ' + student + '، أرغب في حجز حصة تجريبية')}`);
    }

    // 2. وظيفة تحميل البوستر كصورة عالية الجودة (بدل السكرين شوت)
    function downloadPoster() {
        const card = document.getElementById('referral-card');
        html2canvas(card, {
            scale: 3, // يضاعف الجودة 3 مرات (Ultra HD)
            useCORS: true, // للسماح بتحميل الصور الخارجية مثل الخلفية
            borderRadius: 56
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Referral-Card-${document.getElementById('input-student').value}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    updateCard();
</script>

<button onclick="downloadPoster()" class="w-full mt-4 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">
    حفظ البوستر بجودة عالية ✨
</button>
