<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk Poster - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #referral-card {
            position: relative;
            width: 450px;
            height: 650px; /* زيادة الطول قليلاً لراحة العناصر */
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: #fff;
        }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .content-layer { position: relative; z-index: 10; height: 100%; padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; text-align: center; color: white; }
        
        /* المستشار يمين والشعار يسار */
        .top-header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 10px; }
        .consultant-tag { background: white; padding: 5px 15px; border-radius: 12px; color: #1e3a8a; font-weight: 900; border-bottom: 4px solid #facc15; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mini-logo-box { background: white; padding: 6px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mini-logo-box img { height: 35px; width: auto; }

        .glass-item { background: rgba(255, 255, 255, 0.95); border-radius: 1rem; padding: 8px; color: #1e3a8a; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        #qrcode { background: white; padding: 10px; border-radius: 1.2rem; display: inline-block; margin: 10px auto; }

        /* زر الواتساب - رفع الطبقة ليكون فوق كل شيء */
        .phone-container { position: relative; z-index: 30; margin-bottom: 60px; } /* هام: الهامش السفلي لمنع التداخل */
        .phone-box-btn {
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 22px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* شريط تابي وتمارا - في الخلفية تماماً في الأسفل */
        .footer-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            z-index: 5; /* طبقة أقل من زر الواتساب */
        }
        .footer-strip img { height: 22px; width: auto; opacity: 0.9; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <div id="referral-card">
        <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/my-bg.JPG" class="card-bg">
        
        <div class="content-layer">
            <div class="top-header">
                <div class="consultant-tag" id="display-consultant">مصطفى</div>
                <div class="mini-logo-box">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/logo.png">
                </div>
            </div>

            <div class="mt-2">
                <h3 class="text-md font-bold">إهداء حصري وخاص من <span id="display-student" class="text-yellow-400 font-black text-lg">بندر الحربي</span></h3>
                <h1 class="text-2xl font-black leading-tight">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            </div>

            <div class="grid grid-cols-2 gap-2 my-2">
                <div class="glass-item">🌍 منصة عالمية ومعلمين أجانب</div>
                <div class="glass-item">🎁 حصة تقييمية مجانية</div>
                <div class="glass-item">🗣️ التركيز على التحدث بطلاقة</div>
                <div class="glass-item">⏳ حصص فردية وأوقات مرنة</div>
            </div>

            <div>
                <div id="qrcode"></div>
                <p class="text-xs font-bold text-white drop-shadow-md">امسح الكود للحجز المباشر</p>
            </div>

            <div class="phone-container">
                <div class="phone-box-btn">
                    <svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M12.04 2C6.53 2 2.04 6.48 2.04 12C2.04 13.76 2.5 15.41 3.3 16.85L2 21.69L6.96 20.41C8.35 21.16 9.94 21.59 11.63 21.59C11.77 21.59 11.91 21.59 12.04 21.59C17.55 21.59 22.04 17.11 22.04 11.59C22.04 6.08 17.55 1.59 12.04 1.59M12.04 3.59C16.63 3.59 20.41 7.35 20.41 11.59C20.41 15.83 16.63 19.59 12.04 19.59C10.47 19.59 9.03 19.15 7.81 18.42L7.52 18.25L4.54 19.03L5.33 16.14L5.13 15.83C4.33 14.56 3.91 13.09 3.91 11.59C3.91 7.35 7.68 3.59 12.27 3.59H12.04M9.04 7.59C8.83 7.59 8.5 7.66 8.22 7.97C7.94 8.27 7.16 9.04 7.16 10.59C7.16 12.14 8.28 13.65 8.44 13.86C8.59 14.07 10.62 17.21 13.73 18.56C14.48 18.88 15.05 19.07 15.5 19.21C16.25 19.45 16.94 19.41 17.48 19.33C18.09 19.24 19.35 18.57 19.61 17.84C19.87 17.11 19.87 16.48 19.79 16.35C19.72 16.22 19.54 16.15 19.28 16.03C19.03 15.9 17.78 15.29 17.55 15.21C17.32 15.13 17.16 15.09 17 15.32C16.83 15.55 16.35 16.11 16.2 16.28C16.05 16.46 15.9 16.48 15.65 16.35C15.4 16.22 14.59 15.96 13.63 15.1C12.88 14.43 12.38 13.61 12.23 13.35C12.09 13.1 12.21 12.96 12.35 12.83C12.47 12.7 12.62 12.5 12.75 12.35C12.89 12.2 12.93 12.1 13.03 11.9C13.13 11.7 13.08 11.53 13.03 11.4C12.95 11.28 12.35 9.79 12.1 9.18C11.85 8.58 11.6 8.67 11.41 8.67C11.23 8.67 11.03 8.67 10.82 8.67C10.62 8.67 10.28 8.75 10 9.06C9.72 9.37 9.04 10.04 9.04 11.39C9.04 12.74 10.03 14.04 10.17 14.24C10.31 14.44 12.11 17.21 14.86 18.4C15.52 18.68 16.02 18.85 16.41 18.97C17.08 19.19 17.69 19.16 18.17 19.09C18.7 19.01 19.8 18.42 20.03 17.78C20.26 17.15 20.26 16.61 20.19 16.5C20.12 16.39 19.97 16.33 19.74 16.22" /></svg>
                    <span id="display-phone">962775552764+</span>
                </div>
            </div>
        </div>

        <div class="footer-strip no-print">
            <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tabby.png">
            <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tamara.png">
        </div>
    </div>

    <div class="no-print mt-6 bg-white p-6 rounded-3xl shadow-xl w-full max-w-sm mx-auto">
        <input type="text" id="input-student" placeholder="اسم الطالب" class="w-full border p-3 rounded-xl text-right mb-2 outline-none" oninput="updateCard()">
        <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full border p-3 rounded-xl text-right mb-2 outline-none" oninput="updateCard()">
        <input type="text" id="input-phone" placeholder="962XXXXXXXX" class="w-full border p-3 rounded-xl text-right mb-4 outline-none" oninput="updateCard()">
        <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">حفظ البوستر</button>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), { width: 140, height: 140 });

        function updateCard() {
            const student = document.getElementById('input-student').value || "بندر الحربي";
            const consultant = document.getElementById('input-consultant').value || "مصطفى";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone + "+";

            const cleanPhone = phone.replace(/\D/g, ''); 
            const message = encodeURIComponent(`مرحبا ${consultant}، أنا من طرف ${student} وأرغب في تجربة حصة مجانية`);
            
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${message}`);
        }
        updateCard();
    </script>
</body>
</html>
