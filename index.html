<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Poster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #referral-card {
            position: relative;
            width: 450px;
            height: 630px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: #fff;
        }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .content-layer { position: relative; z-index: 10; height: 100%; padding: 2.5rem; display: flex; flex-direction: column; justify-content: space-between; text-align: center; color: white; }
        .glass-item { background: rgba(255, 255, 255, 0.95); border-radius: 1rem; padding: 8px 12px; color: #1e3a8a; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* التعديل 2: تصغير ونقل شعار المنصة على اليسار بالزاوية */
        #platform-logo-container {
            position: absolute; /* تحديد موقع مطلق */
            top: 2.5rem; /* نفس المسافة العلوية لاسم المستشار */
            left: 2.5rem; /* في الزاوية اليسرى */
            background: white;
            padding: 8px;
            border-radius: 1.2rem; /* زوايا منحنية أنيقة */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: inline-block;
            z-index: 20; /* فوق كل شيء */
        }
        .platform-logo-img {
            height: 45px; /* تم تصغيره بشكل ملحوظ */
            width: auto;
        }

        #qrcode { background: white; padding: 10px; border-radius: 1.2rem; display: inline-block; margin: 0 auto; }
        #qrcode img { margin: 0 auto; }

        /* تنسيق زر رقم الهاتف */
        .phone-box-btn {
            background: #25d366; /* لون واتساب الرسمي */
            color: white;
            padding: 10px 24px;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 22px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 10px;
        }
        .whatsapp-icon-svg { height: 24px; width: auto; }

        /* التعديل 3: توسيع وتنسيق شعارات تابي وتمارا لتظهر بشكل كامل */
        .bottom-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.2); /* شفافية بسيطة */
            backdrop-filter: blur(10px);
            padding: 15px 10px; /* توسيع الشريط العمودي */
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
            z-index: 15;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-strip img { 
            height: 25px; /* تكبير الشعارات قليلاً لسهولة القراءة */
            width: auto; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); 
            max-width: 100px; /* ضمان عدم تخطي العرض */
        }

        @media print { .no-print { display: none; } #referral-card { box-shadow: none; border-radius: 0; width: 100%; height: 100%; } }
    </style>
</head>
<body>

    <div id="referral-card">
        <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/my-bg.JPG" class="card-bg">
        <div class="content-layer">
            <div class="flex justify-between items-center relative no-print">
                <div class="bg-white px-4 py-1 rounded-lg border-b-4 border-yellow-400 text-blue-900 font-black shadow-sm" id="display-consultant">مصطفى</div>
                <div id="platform-logo-container">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/logo.png" class="platform-logo-img">
                </div>
            </div>

            <div class="mt-4">
                <h3 class="text-lg font-bold">إهداء حصري وخاص من <span id="display-student" class="text-yellow-400 font-black text-xl">بندر الحربي</span></h3>
                <h1 class="text-2xl font-black leading-tight mt-1">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            </div>

            <div class="grid grid-cols-2 gap-2 my-2">
                <div class="glass-item">🌍 منصة عالمية ومعلمين أجانب</div>
                <div class="glass-item">🎁 حصة تقييمية مجانية</div>
                <div class="glass-item">🗣️ التركيز على التحدث بطلاقة</div>
                <div class="glass-item">⏳ حصص فردية وأوقات مرنة</div>
            </div>

            <div class="mb-4">
                <div id="qrcode"></div>
                <p class="mt-2 font-black text-sm italic text-white drop-shadow-md">امسح الكود للحجز المباشر</p>
                
                <div class="phone-box-btn no-print">
                    <svg class="whatsapp-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" fill="white">
                        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.2 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.2-117zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.4-8.6-44.5-27.4-16.4-14.6-27.5-32.8-30.7-38.3-3.2-5.5-.3-8.5 2.5-11.2 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.2 3.7-5.5 5.5-9.2 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                    </svg>
                    <span id="display-phone">962775552764+</span>
                </div>
            </div>
            
            <div class="bottom-strip no-print">
                <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tabby.png">
                <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tamara.png">
            </div>
        </div>
    </div>

    <div class="no-print mt-6 bg-white p-6 rounded-3xl shadow-xl w-full max-w-sm mx-auto">
        <input type="text" id="input-student" placeholder="اسم الطالب" class="w-full border p-3 rounded-xl text-right mb-2 outline-none focus:border-blue-500" oninput="updateCard()">
        <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full border p-3 rounded-xl text-right mb-2 outline-none focus:border-blue-500" oninput="updateCard()">
        <input type="text" id="input-phone" placeholder="962XXXXXXXX" class="w-full border p-3 rounded-xl text-right mb-4 outline-none focus:border-blue-500" oninput="updateCard()">
        
        <p class="text-xs text-center text-gray-500 mb-4">قم بتعبئة البيانات ثم خذ "لقطة شاشة" (Screenshot) للبوستر أعلاه.</p>
        
        <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg mb-2 flex items-center justify-center gap-2 hover:bg-blue-700 transition-all active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span>حفظ البوستر كـ PDF بجودة عالية</span>
        </button>
    </div>

    <script>
        // توليد QR بدقة متوسطة لضمان الوضوح والسرعة
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 160,
            height: 160,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "بندر الحربي";
            const consultant = document.getElementById('input-consultant').value || "مصطفى";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone + "+";

            // تنظيف الرقم من أي رموز وتأكيد تنسيق WhatsApp المباشر
            const cleanPhone = phone.replace(/\D/g, ''); 
            const message = encodeURIComponent(`مرحبا ${consultant}، أنا من طرف ${student} وأرغب في تجربة حصة مجانية`);
            
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${message}`);
        }
        updateCard();
    </script>
</body>
</html>
