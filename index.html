<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - Vertical Alignment Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f3f4f6;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .golden-card { 
            background: linear-gradient(135deg, #f6e8b1 0%, #fdf5d7 100%);
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            border: 12px solid white;
            text-align: center;
        }

        /* كود الـ QR بوضوح عالي وحواف حادة */
        #qrcode canvas, #qrcode img {
            image-rendering: pixelated;
            display: block;
            margin: auto;
        }
        
        /* تأثير الزجاج للشارات مع ثبات المحاذاة */
        .glass-badge {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* حاوية الأيقونات: استخدام المحاذاة العمودية الوسطى الجذري */
        .stable-align {
            display: inline-block !important;
            vertical-align: middle !important;
            line-height: 1 !important;
        }
        
        .stable-text {
            display: inline-block !important;
            vertical-align: middle !important;
            margin-right: 8px !important; /* تباعد ثابت */
            line-height: normal !important;
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 bg-gray-100">
    
    <div id="referral-card" class="max-w-md w-full golden-card rounded-[3rem] overflow-hidden p-8 md:p-10 mx-auto">
        <div class="flex flex-col items-center mb-8 gap-4">
            <img src="logo.png" alt="51Talk" class="h-16 w-auto object-contain">
            <div class="bg-white/80 px-8 py-2 rounded-xl border border-white w-full">
                <h2 id="display-consultant" class="text-2xl font-black text-blue-950 stable-align block text-center">البندري</h2>
            </div>
        </div>

        <div class="mb-8">
            <div class="text-blue-800 font-bold mb-3 stable-align block text-center">إهداء حصري وخاص من <span id="display-student" class="text-red-600 font-black">........</span></div>
            <div class="text-2xl font-black text-blue-950 leading-tight mb-8 stable-align block text-center italic">ابدأ تعلّم اللغة الانجليزية مع 51talk</div>
            
            <div class="grid grid-cols-2 gap-3 mb-8 text-blue-950">
                <div class="glass-badge p-3 rounded-xl border border-white text-right">
                    <span class="text-xl stable-align">🌍</span><span class="text-xs font-bold stable-text">منصة عالمية</span>
                </div>
                <div class="glass-badge p-3 rounded-xl border border-white text-right">
                    <span class="text-xl stable-align">🎁</span><span class="text-xs font-bold stable-text">حصة مجانية</span>
                </div>
                <div class="glass-badge p-3 rounded-xl border border-white text-right">
                    <span class="text-xl stable-align">🗣️</span><span class="text-xl stable-text">تحدث بطلاقة</span>
                </div>
                <div class="glass-badge p-3 rounded-xl border border-white text-right">
                    <span class="text-xl stable-align">⏳</span><span class="text-xs font-bold stable-text">حصص فردية</span>
                </div>
            </div>

            <div class="bg-blue-900/5 rounded-2xl p-5 border border-white/50">
                <div class="flex flex-wrap justify-center gap-2">
                    <div class="glass-badge px-4 py-1 rounded-full text-[10px] font-black text-blue-950 shadow-sm border border-white">💼 إنجليزية الأعمال</div>
                    <div class="glass-badge px-4 py-1 rounded-full text-[10px] font-black text-blue-950 shadow-sm border border-white">🌟 المسار الكلاسيكي</div>
                    <div class="glass-badge px-4 py-1 rounded-full text-[10px] font-black text-blue-950 shadow-sm border border-white">🎓 تحضير الايلتس</div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center border-t border-blue-900/10 pt-8">
            <div class="bg-white p-3 rounded-2xl shadow-xl mb-3 border border-blue-900/5">
                <div id="qrcode"></div>
            </div>
            <div class="text-blue-950 font-black mb-3 text-sm stable-align block text-center italic">امسح الكود للحجز المباشر</div>
            
            <div class="flex items-center gap-2 mb-6 bg-white/90 px-5 py-2 rounded-full border border-green-200 shadow-sm font-bold text-green-700">
                <span>WhatsApp:</span>
                <span id="display-phone" class="text-xl">+962 77 555 2764</span>
            </div>

            <div class="flex items-center gap-8 bg-white/60 px-8 py-3 rounded-2xl border border-white/50">
                <img src="tabby.png" alt="Tabby" class="h-6 w-auto">
                <img src="tamara.png" alt="Tamara" class="h-6 w-auto">
            </div>
        </div>
    </div>

    <div class="mt-8 bg-white p-8 rounded-[2.5rem] shadow-2xl border w-full max-w-md no-print mx-auto mb-10 text-center">
        <h3 class="font-black text-blue-900 mb-6 border-b pb-4">تخصيص البيانات والرسالة</h3>
        <div class="space-y-4">
            <input type="text" id="input-student" placeholder="اسم صديق الطالب" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="962775552764" class="w-full bg-gray-50 border-2 p-4 rounded-2xl outline-none text-right font-bold" oninput="updateCard()">
            
            <button onclick="saveCard()" class="w-full bg-blue-950 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-900 transition-all flex items-center justify-center gap-3">
                <span>📸</span> حفظ الصورة (حل مشكلة المحاذاة)
            </button>
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 140, height: 140, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "........";
            const consultant = document.getElementById('input-consultant').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone.startsWith('+') ? phone : '+' + phone;
            
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            const message = `مرحبا استاذ ${consultant}، انا من طرف الأخ ${student}، أرغب في حجز حصة تجريبية`;
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`);
        }

        function saveCard() {
            const card = document.getElementById('referral-card');
            const btn = event.currentTarget;
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;

            setTimeout(() => {
                html2canvas(card, {
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: null, 
                    borderRadius: 40,
                    logging: false,
                    onclone: (clonedDoc) => {
                        // إجبار نصوص الـ Fix على الاتجاه والمحاذاة الصحيحة في النسخة المحفوظة
                        clonedDoc.querySelectorAll('.stable-align, .stable-text').forEach(el => {
                            el.style.display = 'inline-block';
                            el.style.verticalAlign = 'middle';
                        });
                        clonedDoc.querySelectorAll('p, h2, h3, h1, div').forEach(el => { el.style.direction = 'rtl'; });
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `51Talk-GiftCard.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                    btn.innerText = "📸 حفظ الصورة (حل مشكلة المحاذاة)"; btn.disabled = false;
                });
            }, 500);
        }

        updateCard();
    </script>
</body>
</html>
