<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع الإحالة - 51Talk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .golden-bg { background-color: #f6e8b1; }
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="referral-card" class="max-w-2xl w-full golden-bg rounded-[3rem] overflow-hidden card-shadow relative border-[10px] border-white p-8 md:p-12">
        
        <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
            <img src="logo.png" alt="51Talk" class="h-24 md:h-28 w-auto object-contain" onerror="this.alt='51Talk Logo'">
            
            <div class="text-center md:text-left bg-white/60 px-6 py-4 rounded-2xl border border-white/50 shadow-sm">
                <p class="text-[10px] text-gray-500 font-bold uppercase">المستشار التعليمي:</p>
                <h2 id="display-name" class="text-2xl font-bold text-blue-950">البندري</h2>
            </div>
        </div>

        <div class="text-center mb-10">
            <h3 class="text-blue-800 font-bold mb-2">إهداء حصري وخاص</h3>
            <h1 class="text-3xl md:text-5xl font-black text-blue-950 leading-tight mb-8">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-right max-w-xl mx-auto">
                <div class="flex items-center gap-3 bg-white/40 p-4 rounded-2xl border border-white/50">
                    <span class="text-2xl">🌍</span>
                    <p class="text-gray-800 font-bold">منصة عالمية ومعلمين أجانب</p>
                </div>
                <div class="flex items-center gap-3 bg-white/40 p-4 rounded-2xl border border-white/50">
                    <span class="text-2xl">🎁</span>
                    <p class="text-gray-800 font-bold">حصة تجريبية مجانية تماماً</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center border-t border-blue-900/10 pt-8">
            <div class="bg-white p-4 rounded-[2.5rem] shadow-xl mb-4 border-4 border-blue-900">
                <div id="qrcode"></div>
            </div>
            
            <p class="text-blue-950 font-black mb-8 flex items-center gap-2 text-lg">
                امسح الكود للحجز المباشر عبر الواتساب 
                <span class="text-green-600 text-2xl">💬</span>
            </p>

            <div class="flex items-center gap-12 bg-white/80 px-12 py-6 rounded-[2.5rem] shadow-sm">
                <img src="tabby.png" alt="Tabby" class="h-10 w-auto">
                <div class="w-px h-10 bg-gray-300"></div>
                <img src="tamara.png" alt="Tamara" class="h-10 w-auto">
            </div>
        </div>
    </div>

    <div class="mt-10 bg-white p-8 rounded-3xl shadow-xl border border-gray-200 w-full max-w-md no-print text-center">
        <h3 class="font-bold text-blue-900 mb-4 border-b pb-2">لوحة تخصيص البطاقة</h3>
        <div class="space-y-4">
            <input type="text" id="input-name" placeholder="اسمك هنا" class="w-full bg-gray-50 border p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500 font-bold" oninput="updateCard()">
            <input type="text" id="input-phone" placeholder="رقم الواتساب (مثال: 962775552764)" class="w-full bg-gray-50 border p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500 font-bold" oninput="updateCard()">
        </div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://wa.me/962775552764",
            width: 160,
            height: 160,
            colorDark : "#172554",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updateCard() {
            const name = document.getElementById('input-name').value || "البندري";
            const phone = document.getElementById('input-phone').value || "962775552764";
            document.getElementById('display-name').innerText = name;
            const cleanPhone = phone.replace(/\s/g, '').replace('+', '');
            qrcode.clear();
            qrcode.makeCode("https://wa.me/" + cleanPhone);
        }
    </script>
</body>
</html>
