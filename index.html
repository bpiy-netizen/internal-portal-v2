<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51Talk - QR Update Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #referral-card {
            position: relative;
            width: 450px;
            height: 650px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: #fff;
        }

        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .content-layer { position: relative; z-index: 10; height: 100%; padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; text-align: center; color: white; }
        
        .top-header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 10px; }
        .consultant-tag { background: white; padding: 5px 15px; border-radius: 12px; color: #1e3a8a; font-weight: 900; border-bottom: 4px solid #facc15; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .logo-box-scaled img { 
            height: 70px; 
            width: auto; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .glass-item { background: rgba(255, 255, 255, 0.95); border-radius: 1rem; padding: 8px; color: #1e3a8a; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        /* تعديل الـ QR ليصبح أكثر دقة */
        #qrcode { 
            background: white; 
            padding: 10px; 
            border-radius: 1.2rem; 
            display: inline-block; 
            margin: 10px auto; 
        }

        .phone-container { position: relative; z-index: 30; margin-bottom: 60px; }
        .phone-box-btn {
            background: #25d366;
            color: white;
            padding: 12px 25px;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 22px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .whatsapp-icon-svg { height: 24px; width: auto; }

        .footer-strip { position: absolute; bottom: 0; left: 0; width: 100%; height: 55px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 5; }
        .footer-strip img { height: 22px; width: auto; opacity: 0.9; }

        @media print { .no-print { display: none; } #referral-card { box-shadow: none; border-radius: 0; width: 100%; height: 100%; } }
    </style>
</head>
<body>

    <div id="referral-card">
        <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/my-bg.JPG" class="card-bg">
        
        <div class="content-layer">
            <div class="top-header">
                <div class="consultant-tag" id="display-consultant">مصطفى</div>
                <div class="logo-box-scaled">
                    <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/logo.png">
                </div>
            </div>

            <div class="mt-2">
                <h3 class="text-md font-bold">إهداء حصري وخاص من <span id="display-student" class="text-yellow-400 font-black text-lg">بندر الحربي</span></h3>
                <h1 class="text-2xl font-black leading-tight">ابدأ تعلّم اللغة الانجليزية مع 51talk</h1>
            </div>

            <div class="grid grid-cols-2 gap-2 my-2">
                <div class="glass-item">🌍 منصة عالمية ومعلمين أجانب</div>
                <div class="glass-item">🎁 حصة تقييمية مجانية</div>
                <div class="glass-item">🗣️ التركيز على التحدث بطلاقة</div>
                <div class="glass-item">⏳ حصص فردية وأوقات مرنة</div>
            </div>

            <div>
                <div id="qrcode"></div>
                <p class="text-xs font-bold text-white drop-shadow-md">امسح الكود للحجز المباشر</p>
            </div>

            <div class="phone-container">
                <div class="phone-box-btn">
                    <svg class="whatsapp-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" fill="white">
                        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.2 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.2-117zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.4-8.6-44.5-27.4-16.4-14.6-27.5-32.8-30.7-38.3-3.2-5.5-.3-8.5 2.5-11.2 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.2 3.7-5.5 5.5-9.2 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                    </svg>
                    <span id="display-phone">962775552764+</span>
                </div>
            </div>
        </div>

        <div class="footer-strip no-print">
            <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tabby.png">
            <img src="https://raw.githubusercontent.com/bpiy-netizen/referral-project/refs/heads/main/tamara.png">
        </div>
    </div>

    <div class="no-print mt-6 bg-white p-6 rounded-3xl shadow-xl w-full max-w-sm mx-auto">
        <input type="text" id="input-student" placeholder="اسم الطالب" class="w-full border p-3 rounded-xl text-right mb-2 outline-none" oninput="updateCard()">
        <input type="text" id="input-consultant" placeholder="اسم المستشار" class="w-full border p-3 rounded-xl text-right mb-2 outline-none" oninput="updateCard()">
        <input type="text" id="input-phone" placeholder="962XXXXXXXX" class="w-full border p-3 rounded-xl text-right mb-4 outline-none" oninput="updateCard()">
        <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">حفظ البوستر</button>
    </div>

    <script>
        // التعديل فقط هنا: زيادة مستوى الدقة (CorrectLevel) وحجم الكود
        let qrcode = new QRCode(document.getElementById("qrcode"), { 
            width: 160, 
            height: 160,
            correctLevel : QRCode.CorrectLevel.H // تم تغييره لـ High لزيادة تحمل ضعف الجودة
        });

        function updateCard() {
            const student = document.getElementById('input-student').value || "بندر الحربي";
            const consultant = document.getElementById('input-consultant').value || "مصطفى";
            const phone = document.getElementById('input-phone').value || "962775552764";
            
            document.getElementById('display-student').innerText = student;
            document.getElementById('display-consultant').innerText = consultant;
            document.getElementById('display-phone').innerText = phone + "+";

            const cleanPhone = phone.replace(/\D/g, ''); 
            const message = encodeURIComponent(`مرحبا ${consultant}، أنا من طرف ${student} وأرغب في تجربة حصة مجانية`);
            
            qrcode.clear();
            qrcode.makeCode(`https://wa.me/${cleanPhone}?text=${message}`);
        }
        updateCard();
    </script>
</body>
</html>
